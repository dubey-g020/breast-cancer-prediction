<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Breast Cancer Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: #0f172a;
            color: white;
        }

        .card{
            border-radius: 20px;
        }

        h1{
            font-weight: bold;
        }

        .btn-custom{
            background: #2563eb;
            color: white;
            font-size: 18px;
            padding: 10px;
            border-radius: 10px;
        }

        .btn-custom:hover{
            background: #1d4ed8;
            color: white;
        }

        .result{
            font-size: 28px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container mt-5 mb-5">

    <div class="card p-5 shadow-lg">

        <h1 class="text-center text-dark mb-4">
            Breast Cancer Prediction System
        </h1>

        <form action="/predict" method="post">

            <div class="row">

                {% for i in range(1,31) %}

                <div class="col-md-4 mb-3">

                    <input
                        type="number"
                        step="any"
                        name="f{{i}}"
                        class="form-control"
                        placeholder="Feature {{i}}"
                        required
                    >

                </div>

                {% endfor %}

            </div>

            <button type="submit" class="btn btn-custom w-100 mt-3">
                Predict Cancer
            </button>

        </form>

        {% if prediction_text %}

        <div class="text-center mt-4">

            <div class="result text-success">
                {{ prediction_text }}
            </div>

        </div>

        {% endif %}

    </div>

</div>

</body>
</html>
